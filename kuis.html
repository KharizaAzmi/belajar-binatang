<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuis Binatang – Belajar Binatang</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">🐾 Belajar Binatang</div>
      <ul class="nav-links">
        <li><a href="index.html">Beranda</a></li>
        <li><a href="video.html">Video</a></li>
        <li><a href="kuis.html" class="active">Kuis</a></li>
        <li><a href="permainan.html">Permainan</a></li>
        <li><a href="flashcard.html">Flashcard</a></li>
        <li><a href="suara.html">Suara</a></li>
        <li><a href="penilaian.html">Penilaian</a></li>
      </ul>
      <button class="hamburger" onclick="toggleMenu()">☰</button>
    </nav>

    <div class="page-header">
      <h1>❓ Kuis Interaktif Binatang</h1>
      <p>Jawab 5 pertanyaan tentang binatang. Semangat ya!</p>
    </div>

    <div class="kuis-container">
      <div class="kuis-box">
        <!-- PROGRESS -->
        <div class="kuis-progress">
          <div class="progress-bar">
            <div
              class="progress-fill"
              id="progressFill"
              style="width: 0%"
            ></div>
          </div>
          <span class="progress-text" id="progressText">Soal 1 / 5</span>
        </div>

        <!-- SOAL AREA -->
        <div id="quizArea">
          <div class="kuis-question" id="questionText"></div>
          <div class="options-grid" id="optionsGrid"></div>
          <div class="kuis-feedback" id="feedbackBox"></div>
          <button class="btn-next" id="btnNext" onclick="nextQuestion()">
            Soal Berikutnya →
          </button>
        </div>

        <!-- HASIL AKHIR -->
        <div class="hasil-box" id="hasilBox">
          <div class="hasil-emoji" id="hasilEmoji"></div>
          <div class="hasil-nilai" id="hasilNilai"></div>
          <div class="hasil-label" id="hasilLabel"></div>
          <button class="btn-ulang" onclick="resetKuis()">
            🔄 Ulangi Kuis
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>
        🌿 Belajar Binatang · RA Aswaja Besole · Ina Ria Fitriani · UT Malang
        2026
      </p>
    </footer>

    <script src="assets/js/kuis.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
